name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["release/**", main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: employee-portal-${{ github.event.workflow_run.head_sha }} }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Deploy to DEV
        run: bash scripts/deploy/deploy.sh dev
      - name: Smoke test
        run: bash scripts/deploy/smoke-test.sh dev

  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa   # GitHub "environment" with required reviewers = manual approval gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: employee-portal-${{ github.event.workflow_run.head_sha }} }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Deploy to QA
        run: bash scripts/deploy/deploy.sh qa
      - name: Integration tests
        run: bash scripts/deploy/integration-test.sh qa

  deploy-prod:
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: prod   # required reviewers = manual approval gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: employee-portal-${{ github.event.workflow_run.head_sha }} }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Deploy to PROD
        run: bash scripts/deploy/deploy.sh prod
      - name: Smoke test
        run: bash scripts/deploy/smoke-test.sh prod
      - name: Health check
        run: bash scripts/deploy/health-check.sh prod