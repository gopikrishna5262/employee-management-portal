name: CI

on:
  pull_request:
    branches: [develop, main, "release/**"]
  push:
    branches: ["feature/**", "release/**"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application/backend
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17', cache: maven }

      - name: Compile
        run: mvn -B compile

      - name: Unit tests
        run: mvn -B test

      - name: JaCoCo coverage report
        run: mvn -B jacoco:report

      - name: Enforce 80% coverage
        run: mvn -B jacoco:check

      - name: Checkstyle
        run: mvn -B checkstyle:check

      - name: SpotBugs
        run: mvn -B spotbugs:check

      - name: SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.qualitygate.wait=true

      - name: OWASP Dependency Check
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with: { config: p/java }

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Package WAR
        run: mvn -B package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: employee-portal-${{ github.sha }}
          path: |
            application/backend/target/*.war
            application/backend/target/site/jacoco/**
            application/backend/target/surefire-reports/**
            application/backend/target/dependency-check-report.html