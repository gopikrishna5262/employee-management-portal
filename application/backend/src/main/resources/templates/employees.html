<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2>Employees</h2>
    <div class="d-flex justify-content-between mb-3">
        <input type="text" id="searchBox" class="form-control w-25" placeholder="Search employees...">
        <a th:href="@{/employees/new}" class="btn btn-success">+ Add Employee</a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th><th>First Name</th><th>Last Name</th><th>Email</th>
                <th>Department</th><th>Designation</th><th>Salary</th><th>Actions</th>
            </tr>
        </thead>
        <tbody id="employeeTableBody">
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}"></td>
                <td th:text="${emp.firstName}"></td>
                <td th:text="${emp.lastName}"></td>
                <td th:text="${emp.email}"></td>
                <td th:text="${emp.department}"></td>
                <td th:text="${emp.designation}"></td>
                <td th:text="${emp.salary}"></td>
                <td>
                    <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-sm btn-primary">Edit</a>
                    <button class="btn btn-sm btn-danger" th:attr="data-id=${emp.id}" onclick="deleteEmployee(this)">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>

<script>
function deleteEmployee(btn) {
    const id = btn.getAttribute('data-id');
    if (!confirm('Delete this employee?')) return;
    fetch(`/employees/${id}`, { method: 'DELETE' })
        .then(res => { if (res.ok) btn.closest('tr').remove(); });
}
document.getElementById('searchBox').addEventListener('input', function() {
    const filter = this.value.toLowerCase();
    document.querySelectorAll('#employeeTableBody tr').forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(filter) ? '' : 'none';
    });
});
</script>
</body>
</html>
